name: Storybook

on:
  pull_request:
    paths:
      - "apps/storybook/**"
      - "packages/ui/**"
      - "packages/metadata-ui/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/storybook.yml"
  push:
    branches:
      - main
    paths:
      - "apps/storybook/**"
      - "packages/ui/**"
      - "packages/metadata-ui/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/storybook.yml"

jobs:
  build:
    name: Build Storybook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm --filter storybook check:build

      - name: Storybook scorecard
        run: pnpm --filter storybook scorecard

      - name: Story interaction tests
        run: pnpm --filter storybook test:stories

  visual-regression:
    name: Storybook visual regression
    runs-on: ubuntu-latest
    # Nightly-style gate; does not block PR merges on snapshot drift during iteration.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify metadata-ui generated artifacts
        run: pnpm --filter @repo/metadata-ui check:generated

      - name: Visual regression
        run: pnpm --filter storybook test:visual
