name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  changes:
    name: Detect Integration Changes
    runs-on: ubuntu-latest
    outputs:
      database: ${{ steps.filter.outputs.database }}
      search: ${{ steps.filter.outputs.search }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            search:
              - '.github/workflows/quality.yml'
              - 'docker-compose.search.yml'
              - 'package.json'
              - 'packages/search/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'scripts/search-local.mjs'
            database:
              - '.github/workflows/quality.yml'
              - 'docker-compose.database.yml'
              - 'package.json'
              - 'packages/database/**'
              - 'packages/features/hr-suite/time-attendance/leave-attendance-management/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'scripts/database-local.mjs'

  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run CI
        run: pnpm run ci

  search-integration:
    name: Search Integration
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.search == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run search integration
        run: node scripts/search-local.mjs integration

  database-integration:
    name: Database Integration
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.database == 'true'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: pnpm --filter @repo/database db:migrate

      - name: Run leave-attendance-management database integration tests
        run: pnpm --filter @repo/features-time-attendance-leave-attendance-management test:integration
