name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate Ultracite
        run: pnpm lint:doctor

      - name: Validate Biome
        run: pnpm lint:biome:ci

      - name: Validate Architecture Boundaries
        run: pnpm lint:architecture

      - name: Typecheck
        run: pnpm typecheck
